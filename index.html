<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criminalística Tema 14 - Rivera & Gutiérrez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');
        
        :root {
            --neon-blue: #00f2ff;
            --neon-yellow: #f0ff00;
            --neon-red: #ff0055;
            --bg-dark: #050505;
        }

        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #e2e8f0;
        }

        .font-header { font-family: 'Orbitron', sans-serif; }
        
        .cyber-card {
            background: rgba(10, 10, 15, 0.9);
            border: 2px solid #1e293b;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(0, 242, 255, 0.05);
            position: relative;
        }

        .cyber-card::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--neon-blue), transparent, var(--neon-yellow));
            z-index: -1;
            border-radius: inherit;
            opacity: 0.3;
        }

        .btn-option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .btn-option:hover:not(:disabled) {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            transform: scale(1.02);
        }

        .caution-bar {
            background: repeating-linear-gradient(
                45deg,
                var(--neon-yellow),
                var(--neon-yellow) 15px,
                #000 15px,
                #000 30px
            );
        }

        .scanner-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--neon-blue);
            opacity: 0.5;
            box-shadow: 0 0 10px var(--neon-blue);
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="max-w-3xl w-full cyber-card rounded-3xl overflow-hidden">
        
        <!-- PANTALLA INICIAL -->
        <div id="intro-screen" class="p-8 md:p-12 text-center">
            <div class="caution-bar h-6 w-full mb-8 rounded-lg shadow-lg"></div>
            
            <h2 class="text-blue-400 font-bold tracking-widest text-xs mb-4">CRIMINALÍSTICA CIENTÍFICA</h2>
            <h1 class="font-header text-5xl md:text-6xl font-extrabold text-white mb-4 tracking-tighter">
                TEMA <span class="text-yellow-400">14</span>
            </h1>
            <p class="text-slate-400 text-sm md:text-base mb-10 max-w-md mx-auto">
                Evaluación Metodológica de Investigación y Protocolos Forenses
            </p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10 text-left">
                <div class="bg-blue-900/10 border border-blue-500/30 p-5 rounded-2xl">
                    <span class="text-[10px] text-blue-500 font-bold block mb-1">CATEDRÁTICO/INVESTIGADOR</span>
                    <span class="text-white font-bold">Juan Daniel Rivera Gonzalez</span>
                </div>
                <div class="bg-blue-900/10 border border-blue-500/30 p-5 rounded-2xl">
                    <span class="text-[10px] text-blue-500 font-bold block mb-1">CATEDRÁTICO/INVESTIGADOR</span>
                    <span class="text-white font-bold">Ricardo Gutiérrez Acevedo</span>
                </div>
            </div>

            <button onclick="startQuiz()" class="w-full bg-blue-600 hover:bg-cyan-500 text-white font-header font-bold py-6 rounded-2xl shadow-[0_0_30px_rgba(37,99,235,0.4)] transition-all active:scale-95 group">
                INICIAR PROTOCOLO TEMA 14
            </button>
        </div>

        <!-- INTERFAZ DE PREGUNTAS -->
        <div id="quiz-ui" class="hidden">
            <div class="bg-slate-900/80 p-6 border-b border-slate-800 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="text-2xl font-header font-bold text-yellow-400">#<span id="q-idx">1</span></div>
                    <div class="h-8 w-px bg-slate-700"></div>
                    <div>
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Procedimiento Pericial</p>
                        <p class="text-white text-xs font-bold">Rivera & Gutiérrez</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-blue-500 font-bold">PRECISIÓN</p>
                    <p class="text-2xl font-header font-bold text-white"><span id="score-val">0</span>/10</p>
                </div>
            </div>

            <div class="w-full bg-slate-800 h-1">
                <div id="progress-bar" class="h-full bg-cyan-400 shadow-[0_0_10px_#00f2ff] transition-all duration-500"></div>
            </div>

            <div class="p-6 md:p-8">
                <div id="img-container" class="w-full h-52 bg-black/40 rounded-2xl mb-8 flex items-center justify-center border border-slate-800 relative overflow-hidden">
                    <div class="scanner-line"></div>
                    <!-- SVG dinámico aquí -->
                </div>

                <h3 id="question-txt" class="text-xl md:text-2xl font-bold text-white mb-8 leading-tight">...</h3>

                <div id="options-box" class="grid grid-cols-1 gap-3">
                    <!-- 5 Opciones aquí -->
                </div>
            </div>

            <div id="feedback-area" class="hidden px-8 pb-8 animate-fade-in">
                <div id="feedback-box" class="p-5 rounded-2xl border-l-4 mb-6"></div>
                <button onclick="nextQ()" class="w-full bg-white text-black font-bold py-4 rounded-xl hover:bg-cyan-400 transition-colors">
                    SIGUIENTE FASE →
                </button>
            </div>
        </div>

        <!-- RESULTADOS -->
        <div id="results" class="hidden p-12 text-center">
            <div class="caution-bar h-2 w-24 mx-auto mb-10 rounded-full"></div>
            <h2 class="font-header text-4xl font-bold text-white mb-2">INFORME FINAL</h2>
            <div class="inline-block p-12 rounded-full border-2 border-cyan-500/30 bg-cyan-500/5 mb-8">
                <div class="text-7xl font-header font-bold text-white" id="final-score">0</div>
                <div class="text-cyan-500 font-bold text-xs tracking-widest">ACIERTOS</div>
            </div>
            <p id="result-msg" class="text-slate-400 mb-10 italic"></p>
            <button onclick="location.reload()" class="w-full border border-slate-700 py-4 rounded-xl text-slate-400 font-bold hover:bg-slate-900 transition">
                REINICIAR EVALUACIÓN
            </button>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "¿Qué pilares exige la Tesis 1a. CLXXXVII/2006 para validar la prueba científica?",
                img: `<svg viewBox="0 0 200 120" class="h-40"><path d="M40 100 L160 100" stroke="#334" stroke-width="4"/><rect x="55" y="40" width="10" height="60" fill="#00f2ff"/><rect x="95" y="30" width="10" height="70" fill="#00f2ff"/><rect x="135" y="50" width="10" height="50" fill="#00f2ff"/><path d="M40 30 L160 30" stroke="#f0ff00" stroke-width="2"/></svg>`,
                options: [
                    "Experiencia empírica, error conocido y aceptación científica", // Correcta
                    "Buena fe del perito, años de servicio y cargo institucional",
                    "Cantidad de testigos, rapidez de entrega y costo del análisis",
                    "Opinión subjetiva del juez y consenso de la fiscalía",
                    "Uso de tecnología de punta exclusivamente"
                ],
                correct: 0,
                exp: "El estándar Daubert/Tesis exige verificabilidad, margen de error y validación por pares."
            },
            {
                q: "Dentro de la Trilogía Investigadora, ¿quién ejerce la Conducción Jurídica?",
                img: `<svg viewBox="0 0 200 120" class="h-40"><circle cx="100" cy="50" r="30" fill="none" stroke="#00f2ff" stroke-width="2" stroke-dasharray="5"/><text x="100" y="55" text-anchor="middle" fill="#00f2ff" font-size="10">M.P.</text><circle cx="60" cy="90" r="15" fill="#334"/><circle cx="140" cy="90" r="15" fill="#334"/></svg>`,
                options: [
                    "Los Peritos Forenses",
                    "El Ministerio Público", // Correcta
                    "La Policía de Investigación",
                    "El Juez de Control",
                    "El Asesor Jurídico de la víctima"
                ],
                correct: 1,
                exp: "El MP dirige jurídicamente, la Policía opera y los Peritos aportan la técnica científica."
            },
            {
                q: "¿Cuál de estos eventos genera una Nulidad Absoluta de la prueba?",
                img: `<svg viewBox="0 0 200 120" class="h-40"><rect x="30" y="40" width="140" height="40" fill="#ff0055" opacity="0.2"/><path d="M30 40 L170 80 M170 40 L30 80" stroke="#ff0055" stroke-width="5"/></svg>`,
                options: [
                    "Errores ortográficos en el etiquetado del indicio",
                    "Omisión de la hora exacta de recolección",
                    "Uso de embalaje subóptimo pero no destructivo",
                    "Alteración deliberada de la escena o siembra de indicios", // Correcta
                    "Falta de una firma en el folio de traslado"
                ],
                correct: 3,
                exp: "La alteración deliberada rompe la trazabilidad y el debido proceso de forma irreparable."
            },
            {
                q: "En fotografía forense, ¿para qué sirve específicamente el Testigo Métrico?",
                img: `<svg viewBox="0 0 200 120" class="h-40"><rect x="50" y="80" width="100" height="15" fill="#f0ff00"/><path d="M60 80 v15 M80 80 v10 M100 80 v15" stroke="black" stroke-width="1"/><circle cx="100" cy="40" r="20" fill="#00f2ff"/></svg>`,
                options: [
                    "Para iluminar zonas con poca visibilidad",
                    "Para dar una referencia de escala y dimensión real del indicio", // Correcta
                    "Para identificar al perito que tomó la fotografía",
                    "Para señalar la dirección del norte magnético",
                    "Para evitar que la lente de la cámara se desenfoque"
                ],
                correct: 1,
                exp: "Sin escala, es imposible conocer el tamaño real de un indicio en una fotografía técnica."
            },
            {
                q: "¿Qué estudia la Balística Exterior específicamente?",
                img: `<svg viewBox="0 0 200 120" class="h-40"><path d="M20 100 Q 100 0 180 100" stroke="#00f2ff" stroke-width="2" fill="none" stroke-dasharray="5"/><circle cx="100" cy="25" r="4" fill="#f0ff00"/></svg>`,
                options: [
                    "La presión de gases dentro de la recámara",
                    "Las marcas de la aguja percutora en el fulminante",
                    "El vuelo del proyectil, trayectoria y efectos de la gravedad", // Correcta
                    "Los daños causados en el cuerpo de la víctima",
                    "La composición química de la pólvora incombusta"
                ],
                correct: 2,
                exp: "Comienza cuando el proyectil sale del cañón y termina al impactar el objetivo."
            },
            {
                q: "¿Qué caracteriza a una Huella de Derrape en hechos de tránsito?",
                img: `<svg viewBox="0 0 200 120" class="h-40"><path d="M40 100 Q 100 100 160 40" stroke="#00f2ff" stroke-width="8" fill="none" stroke-dasharray="10"/></svg>`,
                options: [
                    "Neumático bloqueado arrastrando en línea recta",
                    "Pérdida de adherencia por fuerza centrífuga lateral", // Correcta
                    "Aceleración brusca desde el reposo",
                    "Frenado intermitente con sistema ABS",
                    "Impacto frontal contra objeto fijo"
                ],
                correct: 1,
                exp: "El derrape implica un desplazamiento lateral, a diferencia de la frenada que es longitudinal."
            },
            {
                q: "En un incendio, ¿qué indica el vértice de un patrón en forma de 'V'?",
                img: `<svg viewBox="0 0 200 120" class="h-40"><path d="M100 100 L50 20 M100 100 L150 20" stroke="#ff0055" stroke-width="4"/><circle cx="100" cy="100" r="5" fill="#f0ff00"/></svg>`,
                options: [
                    "El punto de origen o inicio del fuego", // Correcta
                    "La zona de mayor acumulación de gases tóxicos",
                    "El lugar donde se aplicó el extintor",
                    "La marca de un acelerante líquido (gasolina)",
                    "El punto de salida de las llamas al exterior"
                ],
                correct: 0,
                exp: "El fuego tiende a subir y expandirse, dejando un vértice en el punto de ignición inicial."
            },
            {
                q: "¿Cuál es el fundamento científico de la Grafoscopía?",
                img: `<svg viewBox="0 0 200 120" class="h-40"><path d="M40 80 L160 40" stroke="#00f2ff" stroke-width="2"/><path d="M150 40 Q 150 90 100 90" stroke="#f0ff00" stroke-width="1" fill="none"/></svg>`,
                options: [
                    "La calidad del papel y su gramaje",
                    "La oxidación de las tintas comerciales",
                    "El tipo de bolígrafo o pluma fuente utilizado",
                    "La acción neuromuscular y automatismos cerebrales", // Correcta
                    "El contenido literario y emocional del texto"
                ],
                correct: 3,
                exp: "La escritura es un proceso cerebral automático; los gestos invisibles son imposibles de falsificar."
            },
            {
                q: "Según Vucetich, ¿qué define a las huellas dactilares?",
                img: `<svg viewBox="0 0 200 120" class="h-40"><path d="M100 20 C 60 20 60 100 100 100 C 140 100 140 20 100 20" stroke="#00f2ff" stroke-width="1" fill="none"/><circle cx="100" cy="60" r="3" fill="#f0ff00"/></svg>`,
                options: [
                    "Que se borran con el paso de los años",
                    "Que son iguales en gemelos idénticos",
                    "Que son perennes, inmutables y diversiformes", // Correcta
                    "Que dependen de la alimentación de la persona",
                    "Que solo se encuentran en los dedos de las manos"
                ],
                correct: 2,
                exp: "No cambian, no se borran y no hay dos iguales en el mundo."
            },
            {
                q: "¿Para qué sirve la Ninhidrina en dactiloscopía latente?",
                img: `<svg viewBox="0 0 200 120" class="h-40"><path d="M80 40 h40 v60 h-40 z" fill="#334"/><path d="M130 50 c 20 0 20 40 0 40" stroke="#ff0055" stroke-width="4"/></svg>`,
                options: [
                    "Para revelar huellas en cristal o metal",
                    "Para limpiar la escena de rastros biológicos",
                    "Para fijar huellas de pisadas en lodo",
                    "Para reaccionar con aminoácidos en papel (Púrpura de Ruhemann)", // Correcta
                    "Para detectar rastros de explosivos C4"
                ],
                correct: 3,
                exp: "Es el reactivo estándar para superficies porosas, revelando huellas invisibles en documentos."
            }
        ];

        let currentQ = 0;
        let score = 0;
        let canAnswer = true;

        function startQuiz() {
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('quiz-ui').classList.remove('hidden');
            renderQ();
        }

        function renderQ() {
            canAnswer = true;
            const q = questions[currentQ];
            document.getElementById('q-idx').innerText = currentQ + 1;
            document.getElementById('question-txt').innerText = q.q;
            document.getElementById('img-container').innerHTML = `<div class="scanner-line"></div>${q.img}`;
            document.getElementById('progress-bar').style.width = `${(currentQ / questions.length) * 100}%`;
            
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            
            // Generar los 5 incisos
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "btn-option w-full text-left p-4 rounded-xl flex items-center gap-4 group";
                btn.innerHTML = `
                    <div class="w-10 h-10 rounded-lg bg-slate-900 border border-slate-700 flex items-center justify-center text-cyan-400 font-bold group-hover:border-cyan-400 transition-all shrink-0">
                        ${String.fromCharCode(65 + i)}
                    </div>
                    <span class="text-sm md:text-base text-slate-300 group-hover:text-white transition-colors">${opt}</span>
                `;
                btn.onclick = () => checkAns(i, btn);
                box.appendChild(btn);
            });

            document.getElementById('feedback-area').classList.add('hidden');
        }

        function checkAns(idx, btn) {
            if (!canAnswer) return;
            canAnswer = false;

            const q = questions[currentQ];
            const fBox = document.getElementById('feedback-box');
            const btns = document.querySelectorAll('.btn-option');

            btns.forEach(b => b.disabled = true);

            if (idx === q.correct) {
                score++;
                btn.classList.add('border-cyan-500', 'bg-cyan-500/10');
                fBox.className = "p-5 rounded-2xl border-l-4 border-cyan-500 bg-cyan-500/5 text-cyan-100";
                fBox.innerHTML = `<h4 class="font-bold mb-1 text-cyan-400 tracking-widest text-xs">VALIDACIÓN EXITOSA</h4><p class="text-sm opacity-80">${q.exp}</p>`;
            } else {
                btn.classList.add('border-red-500', 'bg-red-500/10');
                btns[q.correct].classList.add('border-cyan-500/40', 'bg-cyan-500/5');
                fBox.className = "p-5 rounded-2xl border-l-4 border-red-500 bg-red-500/5 text-red-100";
                fBox.innerHTML = `<h4 class="font-bold mb-1 text-red-400 tracking-widest text-xs">DISCREPANCIA METODOLÓGICA</h4><p class="text-sm opacity-80">${q.exp}</p>`;
            }

            document.getElementById('score-val').innerText = score;
            document.getElementById('feedback-area').classList.remove('hidden');
        }

        function nextQ() {
            currentQ++;
            if (currentQ < questions.length) {
                renderQ();
            } else {
                showFinal();
            }
        }

        function showFinal() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            const msg = document.getElementById('result-msg');
            if (score >= 9) msg.innerText = "EXCELENCIA PERICIAL: Dominio absoluto del Tema 14.";
            else if (score >= 7) msg.innerText = "CAPACIDAD TÉCNICA: Conocimiento sólido con margen de mejora.";
            else msg.innerText = "REVISIÓN URGENTE: Se recomienda releer los protocolos de Rivera & Gutiérrez.";
        }
    </script>
</body>
</html>
