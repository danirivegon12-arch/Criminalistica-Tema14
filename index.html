<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IurisForensic Pro - Academia Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .bg-glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .rank-badge { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex justify-center items-center p-0 sm:p-4">

    <!-- App Container -->
    <div id="app-container" class="w-full max-w-md bg-white h-screen sm:h-[840px] sm:rounded-[3rem] shadow-2xl overflow-hidden flex flex-col relative border-0 sm:border-[10px] border-slate-900">
        
        <!-- Pantalla de Inicio -->
        <div id="screen-welcome" class="flex-1 flex flex-col items-center justify-center p-8 text-center bg-slate-900 text-white">
            <div class="relative mb-8">
                <div class="bg-blue-500 p-8 rounded-[2.5rem] shadow-[0_0_50px_rgba(59,130,246,0.5)]">
                    <i class="fas fa-microscope fa-5x"></i>
                </div>
            </div>
            <h1 class="text-4xl font-extrabold mb-2 tracking-tighter">IurisForensic</h1>
            <p class="text-slate-400 mb-12 text-sm">Plataforma de capacitación especializada para juristas mexicanos.</p>
            <button onclick="showScreen('menu')" class="w-full py-5 bg-white text-slate-900 rounded-3xl font-black text-xl shadow-xl hover:bg-blue-50 transition-all">
                INICIAR SESIÓN
            </button>
        </div>

        <!-- Pantalla de Menú -->
        <div id="screen-menu" class="hidden flex-1 flex flex-col overflow-hidden bg-slate-50">
            <!-- Header con Rango -->
            <div class="bg-slate-900 p-6 pt-12 text-white rounded-b-[3rem] shadow-2xl">
                <div class="flex items-center gap-4 mb-6">
                    <div id="user-rank-icon" class="w-16 h-16 bg-blue-500 rounded-2xl flex items-center justify-center text-2xl shadow-lg rank-badge">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase font-bold text-blue-400 tracking-widest">Tu Rango Actual</p>
                        <h2 id="user-rank-name" class="text-xl font-black italic uppercase">Estudiante</h2>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div class="bg-white/5 p-3 rounded-2xl text-center">
                        <p class="text-[8px] uppercase text-slate-400">Aciertos</p>
                        <span id="stat-hits" class="font-bold">0</span>
                    </div>
                    <div class="bg-white/5 p-3 rounded-2xl text-center">
                        <p class="text-[8px] uppercase text-slate-400">Módulos</p>
                        <span id="stat-mods" class="font-bold">0/5</span>
                    </div>
                    <div class="bg-white/5 p-3 rounded-2xl text-center">
                        <p class="text-[8px] uppercase text-slate-400">Nivel</p>
                        <span id="stat-level" class="font-bold">1</span>
                    </div>
                </div>
            </div>

            <!-- Lista de Módulos -->
            <div class="flex-1 overflow-y-auto p-6 space-y-4 pb-12">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest px-2">Unidades de Aprendizaje</h3>
                <div id="menu-list" class="space-y-4"></div>
            </div>
        </div>

        <!-- Pantalla de Quiz -->
        <div id="screen-quiz" class="hidden flex-1 flex flex-col p-6 bg-white overflow-y-auto">
            <div class="flex items-center mb-6">
                <button onclick="showScreen('menu')" class="mr-4 text-slate-300 hover:text-slate-900"><i class="fas fa-times fa-lg"></i></button>
                <div class="flex-1 h-2 bg-slate-100 rounded-full">
                    <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-500"></div>
                </div>
            </div>

            <div id="question-area" class="animate-slide">
                <div id="badge-cat" class="inline-block px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest text-white mb-4"></div>
                <h2 id="question-text" class="text-2xl font-bold text-slate-900 leading-snug mb-8"></h2>
                <div id="options-list" class="space-y-3"></div>
            </div>

            <div id="feedback-panel" class="hidden mt-8 p-6 bg-slate-900 rounded-[2.5rem] text-white shadow-2xl">
                <div class="flex items-center gap-3 mb-3 text-blue-400">
                    <i class="fas fa-fingerprint"></i>
                    <p class="text-[10px] font-black uppercase tracking-widest">Evidencia Científica</p>
                </div>
                <p id="explanation-text" class="text-xs text-slate-300 leading-relaxed italic mb-6"></p>
                <button onclick="nextQuestion()" class="w-full py-4 bg-blue-500 text-white rounded-2xl font-bold shadow-lg">CONTINUAR</button>
            </div>
        </div>

        <!-- Pantalla de Resultados -->
        <div id="screen-results" class="hidden flex-1 flex flex-col items-center justify-center p-8 text-center bg-white">
            <div id="result-icon" class="text-amber-400 mb-6 scale-125">
                <i class="fas fa-award fa-5x"></i>
            </div>
            <h2 class="text-3xl font-black text-slate-900 mb-2">¡Misión Cumplida!</h2>
            <p id="result-desc" class="text-slate-500 mb-10 px-4 text-sm"></p>
            <button onclick="showScreen('menu')" class="w-full py-5 bg-slate-900 text-white rounded-[2rem] font-bold text-lg">VOLVER AL PANEL</button>
        </div>

        <!-- Home Bar -->
        <div class="h-1.5 w-24 bg-slate-200 rounded-full mx-auto mb-4 shrink-0"></div>
    </div>

    <script>
        // CONFIGURACIÓN Y DATOS
        const RANKS = [
            { min: 0, name: "Estudiante", icon: "fa-user-graduate", color: "bg-blue-500" },
            { min: 4, name: "Pasante Forense", icon: "fa-user-tie", color: "bg-indigo-500" },
            { min: 7, name: "Abogado Litigante", icon: "fa-gavel", color: "bg-purple-600" },
            { min: 9, name: "Perito Especialista", icon: "fa-microscope", color: "bg-emerald-600" },
            { min: 11, name: "Maestro en Criminalística", icon: "fa-crown", color: "bg-amber-500" }
        ];

        const DATA = [
            {
                id: "campo",
                category: "Campo",
                icon: "fa-search",
                color: "bg-blue-500",
                questions: [
                    { q: "¿Cuál es la diferencia entre Indicio y Evidencia?", o: ["Sinónimos", "Indicio: hallazgo; Evidencia: comprobado", "La evidencia es el arma"], c: 1, e: "El indicio es material localizado; se vuelve evidencia tras análisis de laboratorio." },
                    { q: "¿Por qué no usar plástico para sangre húmeda?", o: ["Se mancha", "Humedad destruye ADN", "No es legal"], c: 1, e: "La humedad en plástico genera bacterias que destruyen el ADN." }
                ]
            },
            {
                id: "balistica",
                category: "Balística",
                icon: "fa-crosshairs",
                color: "bg-red-500",
                questions: [
                    { q: "¿Qué detecta la prueba Harrison Gilroy?", o: ["Pólvora", "Plomo, Bario y Antimonio", "Solo Plomo"], c: 1, e: "Es superior porque detecta los tres elementos del fulminante." },
                    { q: "¿Qué estudia la Balística Exterior?", o: ["Dentro del arma", "Vuelo del proyectil", "Impacto final"], c: 1, e: "Estudia la trayectoria desde que el proyectil sale hasta que impacta." }
                ]
            },
            {
                id: "transito",
                category: "Tránsito",
                icon: "fa-car",
                color: "bg-orange-500",
                questions: [
                    { q: "¿Qué es la Huella de Frenado?", o: ["Marca curva", "Franja con estrías alineadas", "Huella de barro"], c: 1, e: "Indica ruedas bloqueadas arrastrándose en línea recta." },
                    { q: "¿Qué se busca en un 'pega y corre'?", o: ["Testigos", "Astillas y fragmentos pintura", "Dactiloscopía"], c: 1, e: "Cristales y pintura permiten identificar el vehículo con precisión." }
                ]
            },
            {
                id: "id",
                category: "Identidad",
                icon: "fa-fingerprint",
                color: "bg-emerald-500",
                questions: [
                    { q: "¿Por qué los dientes sirven en incendios?", o: ["No se queman", "Protegidos por músculos y amalgamas", "Son de titanio"], c: 1, e: "La masa muscular los protege y las amalgamas resisten altas temperaturas." },
                    { q: "¿Qué es una Bifurcación?", o: ["Punto", "Línea que se divide en dos", "Círculo"], c: 1, e: "Cresta que se divide como 'Y', clave en dactiloscopía." }
                ]
            },
            {
                id: "quimica",
                category: "Química",
                icon: "fa-flask",
                color: "bg-purple-500",
                questions: [
                    { q: "¿Qué revela el Luminol?", o: ["ADN", "Sangre lavada (hierro)", "Drogas"], c: 1, e: "Reacciona con el hierro de la sangre incluso tras limpieza extrema." },
                    { q: "¿Qué es una Perla de Fusión?", o: ["Gota de cobre por corto", "Explosivo", "Tinta"], c: 0, e: "Indica cortocircuito, clave para hallar el origen del incendio." }
                ]
            }
        ];

        // LOGICA DE LA APP
        let state = JSON.parse(localStorage.getItem('forensic_online_v1')) || { hits: 0, completed: [] };
        let currentIdx = 0;
        let sessionScore = 0;
        let activeCat = null;

        function showScreen(id) {
            document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById('screen-' + id).classList.remove('hidden');
            if(id === 'menu') { renderMenu(); updateStats(); }
        }

        function updateStats() {
            document.getElementById('stat-hits').innerText = state.hits;
            document.getElementById('stat-mods').innerText = `${state.completed.length}/${DATA.length}`;
            
            // Actualizar Rango
            const rank = [...RANKS].reverse().find(r => state.hits >= r.min);
            document.getElementById('user-rank-name').innerText = rank.name;
            const iconDiv = document.getElementById('user-rank-icon');
            iconDiv.className = `w-16 h-16 ${rank.color} rounded-2xl flex items-center justify-center text-2xl shadow-lg rank-badge`;
            iconDiv.innerHTML = `<i class="fas ${rank.icon}"></i>`;
        }

        function renderMenu() {
            const list = document.getElementById('menu-list');
            list.innerHTML = '';
            DATA.forEach((cat, i) => {
                const isDone = state.completed.includes(cat.id);
                const btn = document.createElement('div');
                btn.className = "flex items-center p-4 bg-white rounded-3xl border border-slate-100 shadow-sm mb-3 active:scale-95 transition-all cursor-pointer";
                btn.onclick = () => { activeCat = cat; startQuiz(); };
                btn.innerHTML = `
                    <div class="${cat.color} p-4 rounded-2xl text-white mr-4"><i class="fas ${cat.icon}"></i></div>
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-800 text-sm">${cat.category}</h4>
                        <p class="text-[9px] uppercase font-bold text-slate-400">${cat.questions.length} Casos</p>
                    </div>
                    ${isDone ? '<i class="fas fa-check-circle text-emerald-500 text-xl"></i>' : '<i class="fas fa-play text-slate-200"></i>'}
                `;
                list.appendChild(btn);
            });
        }

        function startQuiz() {
            currentIdx = 0;
            sessionScore = 0;
            showScreen('quiz');
            renderQuestion();
        }

        function renderQuestion() {
            const q = activeCat.questions[currentIdx];
            document.getElementById('feedback-panel').classList.add('hidden');
            document.getElementById('badge-cat').innerText = activeCat.category;
            document.getElementById('badge-cat').className = `inline-block px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest text-white ${activeCat.color} mb-4`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / activeCat.questions.length) * 100}%`;
            
            const list = document.getElementById('options-list');
            list.innerHTML = '';
            q.o.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = "w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-left text-sm font-semibold text-slate-700 transition-all active:bg-blue-50";
                b.onclick = () => check(i, b);
                b.innerText = opt;
                list.appendChild(b);
            });
        }

        function check(i, btn) {
            const q = activeCat.questions[currentIdx];
            const btns = document.getElementById('options-list').children;
            if(i === q.c) {
                sessionScore++;
                state.hits++;
                btn.classList.add('border-emerald-500', 'bg-emerald-50', 'text-emerald-700');
            } else {
                btn.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                btns[q.c].classList.add('border-emerald-500', 'bg-emerald-100');
            }
            document.getElementById('explanation-text').innerText = q.e;
            document.getElementById('feedback-panel').classList.remove('hidden');
            save();
        }

        function nextQuestion() {
            currentIdx++;
            if(currentIdx < activeCat.questions.length) renderQuestion();
            else finish();
        }

        function finish() {
            if(!state.completed.includes(activeCat.id)) state.completed.push(activeCat.id);
            save();
            showScreen('results');
            document.getElementById('result-desc').innerText = `Módulo ${activeCat.category} completado. Tu puntaje acumulado ha subido a ${state.hits} aciertos.`;
        }

        function save() { localStorage.setItem('forensic_online_v1', JSON.stringify(state)); }

        window.onload = () => { updateStats(); };
    </script>
</body>
</html>
