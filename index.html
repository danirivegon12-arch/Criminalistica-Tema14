<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expediente C-2026/04 | Simulador Pericial</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Nosifer&display=swap');

        :root {
            --blood-red: #8a0303;
            --blood-dark: #4a0000;
            --bg-dark: #050505;
            --paper: #d1c4b4;
            --ink: #1a1a1a;
        }

        body {
            font-family: 'Courier Prime', monospace;
            background-color: var(--bg-dark);
            color: var(--paper);
            margin: 0;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2vh 0;
            background-image: 
                radial-gradient(circle at center, transparent 0%, #000 100%),
                url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.05"/></svg>');
        }

        /* Scanlines CRT Overlay */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container {
            width: 92%;
            max-width: 950px;
            min-height: 90dvh;
            background-color: #121212;
            border: 2px solid #333;
            box-shadow: 0 0 40px rgba(138, 3, 3, 0.2), inset 0 0 50px rgba(0,0,0,0.9);
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            margin-bottom: 30px;
        }

        .splatter {
            position: absolute;
            background: radial-gradient(circle, var(--blood-red) 0%, var(--blood-dark) 60%, transparent 100%);
            border-radius: 50%;
            opacity: 0.6;
            filter: blur(2px);
            pointer-events: none;
        }

        .header {
            border-bottom: 2px solid var(--blood-dark);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: repeating-linear-gradient(45deg, #0a0a0a, #0a0a0a 10px, #111 10px, #111 20px);
        }

        .header h2 {
            margin: 0;
            color: var(--blood-red);
            font-family: 'Nosifer', display;
            font-size: 1.1rem;
            text-shadow: 2px 2px 0px #000;
            line-height: 1.3;
        }

        .content {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding-bottom: 50px;
        }

        #start-screen {
            text-align: center;
            margin-top: 30px;
        }

        .classified-stamp {
            color: var(--blood-red);
            border: 4px solid var(--blood-red);
            display: inline-block;
            padding: 10px 20px;
            font-size: 2.2rem;
            font-weight: bold;
            transform: rotate(-5deg);
            opacity: 0.85;
            margin-bottom: 25px;
            text-shadow: 0 0 8px var(--blood-red);
            box-shadow: 0 0 15px var(--blood-red), inset 0 0 15px var(--blood-red);
        }

        .btn {
            background-color: transparent;
            color: var(--paper);
            border: 1px solid var(--paper);
            padding: 15px 30px;
            font-family: 'Courier Prime', monospace;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            display: block;
        }

        .btn:hover, .btn:active {
            background-color: var(--blood-red);
            border-color: var(--blood-red);
            box-shadow: 0 0 20px var(--blood-red);
            color: #fff;
        }

        .author {
            margin-top: 50px;
            font-size: 0.85rem;
            color: #666;
            border-top: 1px dashed #333;
            padding-top: 15px;
            margin-bottom: 10px;
        }

        #quiz-screen { display: none; }

        .timer-container {
            height: 6px;
            background-color: #000;
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        .timer-fill {
            height: 100%;
            background-color: var(--blood-red);
            width: 100%;
            box-shadow: 0 0 10px var(--blood-red);
            transition: width 0.1s linear;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media(min-width: 768px) {
            .layout { grid-template-columns: 1.2fr 1fr; }
        }

        .evidence-photo {
            border: 2px solid #333;
            background: #000;
            position: relative;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
        }

        .evidence-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(80%) sepia(40%) hue-rotate(320deg) contrast(140%) brightness(0.7);
            transition: filter 0.3s;
        }

        .evidence-photo:hover img {
            filter: grayscale(40%) sepia(20%) hue-rotate(320deg) contrast(120%) brightness(0.9);
        }

        .evidence-photo::after {
            content: "REGISTRO FOTOGRÁFICO // IJA";
            position: absolute;
            bottom: 10px; left: 10px;
            background: rgba(0,0,0,0.9);
            color: #aaa;
            padding: 3px 8px;
            font-size: 0.75rem;
            border-left: 2px solid var(--blood-red);
            letter-spacing: 1px;
        }

        .situation-text {
            font-size: 1.1rem;
            min-height: 100px;
            line-height: 1.5;
            color: var(--paper);
            text-shadow: 0 0 2px rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .opt-btn {
            background: rgba(10,10,10,0.8);
            border: 1px solid #444;
            color: #ccc;
            padding: 15px;
            text-align: left;
            font-family: 'Courier Prime', monospace;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            line-height: 1.4;
        }

        .opt-btn:hover:not(:disabled), .opt-btn:active:not(:disabled) {
            border-color: #fff;
            background: rgba(255,255,255,0.05);
            color: #fff;
        }

        .opt-btn:disabled { cursor: not-allowed; opacity: 0.5; }
        
        .opt-btn.correct { 
            background: rgba(0, 80, 0, 0.4); 
            border-color: #0f0; 
            color: #0f0; 
            text-shadow: 0 0 5px #0f0;
        }
        
        .opt-btn.wrong { 
            background: rgba(138, 3, 3, 0.4); 
            border-color: var(--blood-red); 
            color: #ff4444;
            text-shadow: 0 0 5px #ff4444;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border: 1px dashed var(--blood-red);
            background: rgba(0,0,0,0.9);
            display: none;
            grid-column: 1 / -1;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        #next-btn {
            float: right;
            display: none;
            width: 100%;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-4px) rotate(-1deg); }
            40%, 80% { transform: translateX(4px) rotate(1deg); }
        }
        .shake { animation: shake 0.4s; }

        .danger-pulse { box-shadow: inset 0 0 80px rgba(138,3,3,0.5); }

    </style>
</head>
<body>

    <div class="container" id="main-container">
        <div class="splatter" style="width: 130px; height: 100px; top: -15px; left: -15px;"></div>
        <div class="splatter" style="width: 200px; height: 200px; bottom: 30px; right: -50px;"></div>

        <div class="header">
            <h2>EXPEDIENTE: <br>C-2026/04</h2>
            <div id="q-counter" style="color: #666; text-align: right; font-size: 0.9rem;">Folio:<br>-- / 10</div>
        </div>

        <div class="content">
            
            <div id="start-screen">
                <div class="classified-stamp">RESTRINGIDO</div>
                <h1 style="margin-bottom: 10px; font-size: 2rem;">Auditoría de Escena</h1>
                <p style="color: #888; margin: 0 auto 40px auto; line-height: 1.5; font-size: 0.95rem;">
                    ADVERTENCIA: Material sensible.<br><br>Evalúa 10 supuestos periciales críticos. 
                    El reloj corre (30s). Un error metodológico anulará la evidencia en juicio.
                </p>
                <button class="btn" onclick="startQuiz()">ROMPER SELLO</button>
                <div class="author">Director de Protocolo:<br>Perito Juan Daniel Rivera G.</div>
            </div>

            <div id="quiz-screen">
                <div class="timer-container">
                    <div class="timer-fill" id="timer-bar"></div>
                </div>

                <div class="layout">
                    <div class="evidence-photo">
                        <img id="q-image" src="" alt="Evidencia Fotográfica">
                    </div>

                    <div>
                        <div class="situation-text" id="q-text"></div>
                        <div class="options-list" id="options-box"></div>
                    </div>

                    <div class="feedback" id="feedback-box"></div>
                    <div style="grid-column: 1 / -1; width: 100%;">
                        <button class="btn" id="next-btn" onclick="nextQuestion()">SIGUIENTE FOLIO >></button>
                    </div>
                </div>
            </div>

            <div id="result-screen" style="display: none; text-align: center; margin-top: 20px;">
                <h1 style="font-family: 'Nosifer', display; color: var(--blood-red); font-size: 1.8rem; line-height: 1.4;">DICTAMEN<br>EMITIDO</h1>
                <div style="font-size: 4.5rem; font-weight: bold; margin: 20px 0; color: var(--paper);" id="score-text">0/10</div>
                <p id="final-verdict" style="font-size: 1.1rem; margin: 0 auto 40px; color: #aaa; line-height: 1.5; padding: 0 10px;"></p>
                <button class="btn" onclick="location.reload()">REABRIR EXPEDIENTE</button>
            </div>

        </div>
    </div>

    <script>
        // Array apuntando a las fotos locales del repositorio usando rutas relativas.
        // Se usa %20 en lugar del espacio para que el navegador resuelva la URL correctamente.
        const questions = [
            {
                img: "./Indicio%201.png",
                text: "ESCENA PRIMIGENIA:\nPolicía Operativa localiza una prenda con fluido hemático. El oficial procede a embalarla en una bolsa de plástico hermética para 'evitar derrames'. ¿Cuál es tu instrucción?",
                options: [
                    "[Aprobar] El plástico aísla la evidencia y evita contaminación cruzada.",
                    "[Intervenir] Exigir embalaje en papel/cartón. Se requiere transpiración.",
                    "[Modificar] Lavar la prenda con solución salina antes de embalar."
                ],
                correct: 1,
                exp: "DICTAMEN: La humedad contenida en el plástico hermético genera proliferación bacteriana que destruye el ADN. La impericia destruyó el valor epistémico de la prueba."
            },
            {
                img: "./Indicio%202.png",
                text: "TRIBUNAL:\nLa defensa exhibe agresivamente que omitiste un folio y cometiste un error ortográfico en el Registro de Cadena de Custodia. ¿Cuál es el estatus procesal de la evidencia?",
                options: [
                    "Nulidad Absoluta. Violación al debido proceso y ruptura de trazabilidad.",
                    "Desechamiento cautelar por falta de Idoneidad Metodológica.",
                    "Prueba Admitida. Es una 'falla tolerable', aunque su credibilidad será atacada."
                ],
                correct: 2,
                exp: "DICTAMEN: Los errores tipográficos u omisión ortográfica de folios sobreviven el filtro de legalidad procesal, pero te vuelven altamente vulnerable en el estrado."
            },
            {
                img: "./Indicio%203.png",
                text: "FIJACIÓN FOTOGRÁFICA:\nEncuentras un casquillo percutido. Ajustas la cámara para un 'Primer Plano'. Si omites este elemento en la toma, la defensa alegará siembra o manipulación espacial:",
                options: [
                    "El testigo métrico.",
                    "Plano panorámico de fondo.",
                    "Macrofotografía del percutor."
                ],
                correct: 0,
                exp: "DICTAMEN: Los Primeros Planos exigen testigo métrico. Si la posición espacial del indicio cambia milimétricamente sin referencia, la descontextualización arruina el caso."
            },
            {
                img: "./Indicio%204.png",
                text: "BALÍSTICA:\nEl sistema IBIS acaba de arrojar un 'Hit' conectando el proyectil incriminado con el arma del sospechoso. El fiscal te presiona para firmar condena. ¿Qué respondes?",
                options: [
                    "Firma validada. El algoritmo IBIS constituye prueba científica plena.",
                    "Firma retenida. Se requiere prueba de Rodizonato de Sodio.",
                    "Firma retenida. El Hit es probabilidad; exige microcomparación (ojo a ojo)."
                ],
                correct: 2,
                exp: "DICTAMEN: Alerta Probatoria: Un 'Hit' automatizado nunca es certeza. La certeza jurídica exige indiscutiblemente la microcomparación física bajo el microscopio por el perito."
            },
            {
                img: "./Indicio%205.png",
                text: "HECHOS DE TRÁNSITO:\nLlegas al asfalto y observas una huella neumática en forma de arco pronunciado. La cinemática indica que la rueda perdía adherencia lateralmente. Tipificación:",
                options: [
                    "Huella de Frenado (arrastre longitudinal).",
                    "Huella de Derrape (fuerza centrífuga lateral).",
                    "Huella de Aceleración Brusca."
                ],
                correct: 1,
                exp: "DICTAMEN: El derrape ocurre cuando la rueda en movimiento pierde adherencia por fuerza centrífuga lateral. El frenado bloquea el neumático en línea recta."
            },
            {
                img: "./Indicio%206.png",
                text: "INCENDIOS:\nEn el vértice de un 'Patrón en V' localizas cableado derretido con formaciones globulares conocidas como 'Perlas de fusión'. ¿Cuál es su utilidad pericial?",
                options: [
                    "Identificar el uso de sustancias detonantes (C4, TNT).",
                    "Mapeo topográfico para determinar la secuencia cronológica del corto.",
                    "Medir la transferencia de energía y la temperatura máxima."
                ],
                correct: 1,
                exp: "DICTAMEN: Siguiendo la NFPA 921, las perlas de fusión crean un mapa cronológico irrefutable del origen del cortocircuito."
            },
            {
                img: "./Indicio%207.png",
                text: "DOCUMENTOSCOPÍA:\nEl demandado jura que el acreedor cometió 'abuso de firma en blanco', imprimiendo la deuda DESPUÉS de que él firmó. ¿Qué análisis microscópico te dará la verdad?",
                options: [
                    "Búsqueda de intersección (Texto impreso SOBRE firma manuscrita).",
                    "Análisis de presión rítmica subconsciente del trazo.",
                    "Reacción a luz UV de las fibrillas del papel."
                ],
                correct: 0,
                exp: "DICTAMEN: La superposición microscópica demuestra científicamente el orden cronológico de los trazos, probando la alteración física del documento."
            },
            {
                img: "./Indicio%208.png",
                text: "REVELADO LATENTE:\nTienes una nota de rescate en papel común (superficie porosa). Polvos magnéticos arruinarían el rastro. ¿Qué químico utilizas para reaccionar con los aminoácidos?",
                options: [
                    "Cianoacrilato (Vapores de superpegamento).",
                    "Solución de Rodizonato de Sodio.",
                    "Aspersión de Ninhidrina (Púrpura de Ruhemann)."
                ],
                correct: 2,
                exp: "DICTAMEN: Las superficies porosas absorben el sudor. La Ninhidrina es el reactivo rey porque se ancla a los aminoácidos del fluido dactilar."
            },
            {
                img: "./Indicio%209.png",
                text: "LOFOSCOPÍA:\nBajo la lupa, observas un dactilograma diversiforme. Ubicas 1 delta a la derecha y líneas fluyendo en bucle hacia la izquierda. Taxonomía de Vucetich:",
                options: [
                    "Verticilo.",
                    "Presilla Interna.",
                    "Presilla Externa."
                ],
                correct: 1,
                exp: "DICTAMEN: Vucetich establece: 1 delta a la derecha con líneas fugando a la izquierda = Presilla Interna."
            },
            {
                img: "./Indicio%2010.png",
                text: "CRISIS FORENSE:\nFosa clandestina. Restos óseos sin tejido blando. Interpol exige un 'Identificador Primario' para dar certeza de identidad. ¿Cuál aplicas?",
                options: [
                    "Reconocimiento de tatuajes y malformaciones por familiares.",
                    "Genética Molecular (ADN) u Odontología Forense (Cefalometría).",
                    "Efectos personales anexos al cuerpo (ropa, identificaciones)."
                ],
                correct: 1,
                exp: "DICTAMEN: Ropa y tatuajes son secundarios. El estándar científico internacional exige ADN, Odontología o Dactiloscopía como factores irrefutables."
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let timerInterval;
        let timeLeft = 30; 
        const container = document.getElementById('main-container');

        let typeInterval;
        let isTyping = false;

        function typeWriter(text, element, speed = 20) {
            clearInterval(typeInterval);
            element.innerHTML = '';
            let i = 0;
            isTyping = true;
            typeInterval = setInterval(() => {
                if (i < text.length) {
                    if(text.charAt(i) === '\n') {
                        element.innerHTML += '<br><br>';
                    } else {
                        element.innerHTML += text.charAt(i);
                    }
                    i++;
                } else {
                    clearInterval(typeInterval);
                    isTyping = false;
                }
            }, speed);
        }

        function startQuiz() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            window.scrollTo(0, 0);
            loadQuestion();
        }

        function loadQuestion() {
            clearInterval(timerInterval);
            timeLeft = 30;
            document.getElementById('timer-bar').style.width = '100%';
            
            container.classList.remove('danger-pulse');
            document.getElementById('feedback-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            
            const q = questions[currentIdx];
            document.getElementById('q-counter').innerHTML = `Folio:<br>${String(currentIdx + 1).padStart(2, '0')} / 10`;
            
            // Inyectar Imagen Local
            document.getElementById('q-image').src = q.img;
            
            // Cargar texto
            typeWriter(q.text, document.getElementById('q-text'));
            
            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = () => selectOption(index);
                optionsBox.appendChild(btn);
            });

            // Reloj
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('timer-bar').style.width = `${Math.max(0, (timeLeft / 30) * 100)}%`;
                
                if(timeLeft <= 10 && !container.classList.contains('danger-pulse')) {
                    container.classList.add('danger-pulse');
                }

                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    selectOption(-1); // Timeout
                }
            }, 100);
        }

        function selectOption(idx) {
            clearInterval(timerInterval);
            clearInterval(typeInterval);
            
            if(isTyping) {
                let fullText = questions[currentIdx].text.replace(/\n/g, '<br><br>');
                document.getElementById('q-text').innerHTML = fullText;
            }

            container.classList.remove('danger-pulse');
            
            const q = questions[currentIdx];
            const buttons = document.querySelectorAll('.opt-btn');
            
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                if(i === q.correct) btn.classList.add('correct');
            });

            const fBox = document.getElementById('feedback-box');
            if(idx === q.correct) {
                score++;
                fBox.innerHTML = `<strong style="color:#0f0;">[ACIERTO]</strong><br><br>${q.exp}`;
            } else {
                if(idx !== -1) buttons[idx].classList.add('wrong');
                container.classList.add('shake');
                setTimeout(() => container.classList.remove('shake'), 300);
                
                let reason = idx === -1 ? "[TIEMPO AGOTADO]" : "[ERROR CRÍTICO]";
                fBox.innerHTML = `<strong style="color:#ff4444;">${reason}</strong><br><br>${q.exp}`;
            }

            fBox.style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
            
            setTimeout(() => {
                document.getElementById('next-btn').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function nextQuestion() {
            currentIdx++;
            if(currentIdx < questions.length) {
                loadQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('score-text').innerText = `${score}/10`;
            
            const fb = document.getElementById('final-verdict');
            if(score >= 9) {
                fb.innerHTML = "ESTADO: <span style='color:#0f0'>ÓPTIMO</span><br><br>Idoneidad metodológica impecable. Estás listo para defender el estándar probatorio ante cualquier juez.";
            } else if(score >= 7) {
                fb.innerHTML = "ESTADO: <span style='color:orange'>VULNERABLE</span><br><br>Sólido en la teoría, pero el contrainterrogatorio explotará tus dudas. Revisa la matriz de control de legalidad.";
            } else {
                fb.innerHTML = "ESTADO: <span style='color:red'>COMPROMETIDO</span><br><br>Cadena de custodia destruida. La defensa logró exclusión probatoria por negligencia de campo.";
            }
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
